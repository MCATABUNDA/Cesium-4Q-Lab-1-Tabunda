<body>

    <form name="order-form" action="checkout.html" onsubmit="return validateForm()">

        <br><br>

        <label for = "appleNum">Apples (PHP18/PC): </label>
        <input type = "number" name = "appleNum" id = "appleNum">

        <br><br>

        <label for = "money">Total amount you have: </label>
        <input type = "number" name="money" id="money" required>

        <br>
        
        <button type = "submit">SUBMIT</button>
        <button type = "reset">RESET</button>
    </form>

    <script src="index.js"></script>
